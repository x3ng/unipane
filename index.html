<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unipane</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  display: flex;
  height: 100vh;
  color: #1a1a1a;
  background: #fff;
}

/* Sidebar */
#sidebar {
  width: 260px;
  min-width: 200px;
  border-right: 1px solid #e0e0e0;
  display: flex;
  flex-direction: column;
  background: #fafafa;
  overflow: hidden;
}

#sidebar-header {
  padding: 12px 16px;
  font-weight: 600;
  font-size: 14px;
  border-bottom: 1px solid #e0e0e0;
  flex-shrink: 0;
}

#sidebar-nav {
  padding: 8px 0;
  border-bottom: 1px solid #e0e0e0;
  flex-shrink: 0;
}

.nav-item {
  padding: 6px 16px;
  cursor: pointer;
  font-size: 13px;
  color: #444;
  user-select: none;
}
.nav-item:hover { background: #e8e8e8; }
.nav-item.active { background: #d0d0d0; font-weight: 500; }

#file-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.tree-item {
  padding: 4px 16px;
  cursor: pointer;
  font-size: 13px;
  color: #444;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}
.tree-item:hover { background: #e8e8e8; }
.tree-item.dir { font-weight: 500; }
.tree-item .icon { width: 16px; text-align: center; flex-shrink: 0; }

.tree-children { padding-left: 16px; }
.tree-children.collapsed { display: none; }

/* Main area */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Tab bar */
#tab-bar {
  display: flex;
  background: #f0f0f0;
  border-bottom: 1px solid #e0e0e0;
  flex-shrink: 0;
  overflow-x: auto;
}

.tab {
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  user-select: none;
  border-right: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  max-width: 200px;
}
.tab:hover { background: #e4e4e4; }
.tab.active { background: #fff; border-bottom: 2px solid #0066ff; }
.tab .close {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  font-size: 12px;
  color: #888;
}
.tab .close:hover { background: #ccc; color: #333; }

/* Content */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* Markdown styles */
.md-content h1 { font-size: 1.8em; margin: 0.8em 0 0.4em; }
.md-content h2 { font-size: 1.5em; margin: 0.8em 0 0.4em; }
.md-content h3 { font-size: 1.2em; margin: 0.8em 0 0.4em; }
.md-content p { margin: 0.5em 0; line-height: 1.6; }
.md-content ul, .md-content ol { margin: 0.5em 0; padding-left: 2em; }
.md-content li { margin: 0.2em 0; }
.md-content code {
  background: #f4f4f4;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.9em;
}
.md-content pre {
  background: #f4f4f4;
  padding: 12px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 0.8em 0;
}
.md-content pre code {
  background: none;
  padding: 0;
}
.md-content blockquote {
  border-left: 3px solid #ddd;
  padding-left: 12px;
  color: #666;
  margin: 0.8em 0;
}
.md-content img { max-width: 100%; }
.md-content a { color: #0066ff; text-decoration: none; }
.md-content a:hover { text-decoration: underline; }
.md-content table { border-collapse: collapse; margin: 0.8em 0; }
.md-content th, .md-content td {
  border: 1px solid #ddd;
  padding: 6px 12px;
  text-align: left;
}
.md-content th { background: #f4f4f4; }

/* Welcome */
.welcome {
  color: #888;
  text-align: center;
  margin-top: 20vh;
}
.welcome h2 { color: #444; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">Unipane</div>
  <div id="sidebar-nav"></div>
  <div id="file-tree"></div>
</div>

<div id="main">
  <div id="tab-bar"></div>
  <div id="content">
    <div class="welcome">
      <h2>Welcome</h2>
      <p>点击左侧文件或页面开始浏览</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="main.js"></script>
</body>
</html>
