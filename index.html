<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unipane</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #ffffff;
  --bg-secondary: #fafafa;
  --bg-hover: #e8e8e8;
  --bg-active: #d0d0d0;
  --bg-tab: #f0f0f0;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --text-secondary: #444;
  --text-muted: #888;
  --link: #0066ff;
  --code-bg: #f4f4f4;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1e;
    --bg-secondary: #252526;
    --bg-hover: #2a2a2a;
    --bg-active: #333;
    --bg-tab: #2d2d2d;
    --border: #3e3e3e;
    --text: #d4d4d4;
    --text-secondary: #aaa;
    --text-muted: #666;
    --link: #4da6ff;
    --code-bg: #2d2d2d;
  }
}

html[data-theme="light"] {
  --bg: #ffffff;
  --bg-secondary: #fafafa;
  --bg-hover: #e8e8e8;
  --bg-active: #d0d0d0;
  --bg-tab: #f0f0f0;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --text-secondary: #444;
  --text-muted: #888;
  --link: #0066ff;
  --code-bg: #f4f4f4;
}

html[data-theme="dark"] {
  --bg: #1e1e1e;
  --bg-secondary: #252526;
  --bg-hover: #2a2a2a;
  --bg-active: #333;
  --bg-tab: #2d2d2d;
  --border: #3e3e3e;
  --text: #d4d4d4;
  --text-secondary: #aaa;
  --text-muted: #666;
  --link: #4da6ff;
  --code-bg: #2d2d2d;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  display: flex;
  height: 100vh;
  color: var(--text);
  background: var(--bg);
}

/* Sidebar */
#sidebar {
  width: 260px;
  min-width: 200px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--bg-secondary);
  overflow: hidden;
}

#sidebar-header {
  padding: 12px 16px;
  font-weight: 600;
  font-size: 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sidebar-btn {
  font-size: 11px;
  padding: 2px 8px;
  cursor: pointer;
  background: none;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-muted);
}
.sidebar-btn.active {
  background: var(--bg-active);
  border-color: var(--text-muted);
  color: var(--text-secondary);
}

#sidebar-nav {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.nav-item {
  padding: 6px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  user-select: none;
}
.nav-item:hover { background: var(--bg-hover); }
.nav-item.active { background: var(--bg-active); font-weight: 500; }

#file-tree {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.tree-item {
  padding: 4px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}
.tree-item:hover { background: var(--bg-hover); }
.tree-item.dir { font-weight: 500; }
.tree-item .icon { width: 16px; text-align: center; flex-shrink: 0; }

.tree-children { padding-left: 16px; }
.tree-children.collapsed { display: none; }

/* Main area */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Tab bar */
#tab-bar {
  display: flex;
  background: var(--bg-tab);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}

.tab {
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  user-select: none;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  max-width: 200px;
}
.tab:hover { background: var(--bg-hover); }
.tab.active { background: var(--bg); border-bottom: 2px solid var(--link); }
.tab .close {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  font-size: 12px;
  color: var(--text-muted);
}
.tab .close:hover { background: var(--bg-active); color: var(--text); }

/* Content */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* Markdown styles */
.md-content h1 { font-size: 1.8em; margin: 0.8em 0 0.4em; }
.md-content h2 { font-size: 1.5em; margin: 0.8em 0 0.4em; }
.md-content h3 { font-size: 1.2em; margin: 0.8em 0 0.4em; }
.md-content p { margin: 0.5em 0; line-height: 1.6; }
.md-content ul, .md-content ol { margin: 0.5em 0; padding-left: 2em; }
.md-content li { margin: 0.2em 0; }
.md-content code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.9em;
}
.md-content pre {
  background: var(--code-bg);
  padding: 12px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 0.8em 0;
}
.md-content pre code {
  background: none;
  padding: 0;
}
.md-content blockquote {
  border-left: 3px solid var(--border);
  padding-left: 12px;
  color: var(--text-muted);
  margin: 0.8em 0;
}
.md-content img { max-width: 100%; }
.md-content a { color: var(--link); text-decoration: none; }
.md-content a:hover { text-decoration: underline; }
.md-content table { border-collapse: collapse; margin: 0.8em 0; }
.md-content th, .md-content td {
  border: 1px solid var(--border);
  padding: 6px 12px;
  text-align: left;
}
.md-content th { background: var(--code-bg); }

/* Welcome */
.welcome {
  color: var(--text-muted);
  text-align: center;
  margin-top: 20vh;
}
.welcome h2 { color: var(--text-secondary); margin-bottom: 8px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <span>Unipane</span>
    <span>
      <button id="toggle-hidden" class="sidebar-btn" title="显示隐藏文件">.*</button>
      <button id="toggle-theme" class="sidebar-btn" title="切换主题">◐</button>
    </span>
  </div>
  <div id="sidebar-nav"></div>
  <div id="file-tree"></div>
</div>

<div id="main">
  <div id="tab-bar"></div>
  <div id="content">
    <div class="welcome">
      <h2>Welcome</h2>
      <p>点击左侧文件或页面开始浏览</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="main.js"></script>
</body>
</html>
