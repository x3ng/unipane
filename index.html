<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unipane</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-resize"></div>
  <div id="sidebar-header">
    <span>Unipane</span>
    <span>
      <button id="toggle-hidden" class="sidebar-btn" title="显示隐藏文件">.*</button>
      <button id="toggle-css" class="sidebar-btn" title="切换样式主题">Aa</button>
      <button id="toggle-theme" class="sidebar-btn" title="切换明暗主题">◐</button>
      <button id="toggle-sidebar" class="sidebar-btn" title="隐藏侧边栏">◀</button>
    </span>
  </div>
  <div id="sidebar-nav"></div>
  <div id="file-tree"></div>
</div>

<div id="main">
  <div id="tab-bar"></div>
  <div id="content">
    <div class="welcome">
      <h2>Welcome</h2>
      <p>点击左侧文件或页面开始浏览</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="main.js"></script>
</body>
</html>
